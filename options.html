<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.png" type="image/png">
  <title>AutoAnki - オプション</title>
  <link rel="stylesheet" href="options.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .genre-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .genre-tab {
      padding: 0.5rem 1rem;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.05);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .genre-tab:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
    .genre-tab.active {
      background: rgba(99,102,241,0.3);
      border-color: var(--primary-accent);
      color: #a78bfa;
      font-weight: 600;
    }
    .logo h1 { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
    .dynamic-form .form-group { margin-bottom: 1.5rem; }
    .dynamic-form label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .required-badge {
      background: rgba(99,102,241,0.3);
      color: #a78bfa;
      font-size: 0.7rem;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }
    .dynamic-form input[type="text"],
    .dynamic-form textarea {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
      transition: border-color 0.2s;
    }
    .dynamic-form input:focus,
    .dynamic-form textarea:focus {
      outline: none;
      border-color: var(--primary-accent);
    }
    .form-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    /* ステップインジケーター */
    .step-dot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      cursor: default;
    }
    .step-num {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-secondary);
      transition: all 0.3s;
    }
    .step-lbl {
      font-size: 0.72rem;
      color: var(--text-secondary);
      white-space: nowrap;
      transition: color 0.3s;
    }
    .step-dot.active .step-num {
      background: rgba(99,102,241,0.35);
      border-color: #6366f1;
      color: #a78bfa;
    }
    .step-dot.active .step-lbl { color: #a78bfa; }
    .step-dot.done .step-num {
      background: rgba(34,197,94,0.2);
      border-color: #22c55e;
      color: #4ade80;
    }
    .step-dot.done .step-lbl { color: #4ade80; }
    .step-line {
      flex: 1;
      height: 2px;
      background: rgba(255,255,255,0.1);
      margin: 0 0.5rem;
      margin-bottom: 1.2rem;
      min-width: 40px;
      transition: background 0.3s;
    }
    .step-line.done { background: rgba(34,197,94,0.4); }

    /* テンプレートカード */
    .template-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .template-card:hover {
      background: rgba(99,102,241,0.12);
      border-color: rgba(99,102,241,0.5);
      transform: translateY(-2px);
    }
    .template-card.selected {
      background: rgba(99,102,241,0.2);
      border-color: #6366f1;
    }
    .template-card-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .template-card-fields {
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="background-animation"></div>

  <div class="layout sidebar-fixed" id="app-layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="app-sidebar">
      <div class="logo">
        <h1>AutoAnki</h1>
        <p>Effortless Spaced Repetition</p>
      </div>
      <div class="nav-links">
        <a href="dashboard.html" class="nav-btn">📊 ダッシュボード</a>
        <a href="index.html"     class="nav-btn">▶️ 問題を解く</a>
        <a href="options.html"   class="nav-btn active">➕ 問題作成</a>
        <a href="cardlist.html"  class="nav-btn">📋 問題DB</a>
        <a href="settings.html"  class="nav-btn">⚙️ 設定</a>
        <a href="memo.html"      class="nav-btn">🗒️ メモ</a>
      </div>
      <button class="sidebar-toggle-btn" id="sidebar-toggle-btn" title="サイドバー固定トグル">☰</button>
    </aside>

    <main class="main-content">

      <!-- ステップインジケーター -->
      <div id="step-indicator" style="display:flex;align-items:center;gap:0;margin-bottom:1.5rem;max-width:600px;">
        <div class="step-dot active" data-step="1"><span class="step-num">1</span><span class="step-lbl">型を選ぶ</span></div>
        <div class="step-line"></div>
        <div class="step-dot" data-step="2"><span class="step-num">2</span><span class="step-lbl">微調整</span></div>
        <div class="step-line"></div>
        <div class="step-dot" data-step="3"><span class="step-num">3</span><span class="step-lbl">入力</span></div>
      </div>

      <!-- STEP 1: 型を選ぶ -->
      <div id="step1-panel">
        <section class="section glass-panel" style="padding:1.5rem 2rem;margin-bottom:0;">
          <h2 class="section-title" style="margin:0 0 1.25rem;border:none;padding:0;font-size:1.1rem;">どの型で作りますか？</h2>
          <div id="template-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.75rem;margin-bottom:1.25rem;">
            <!-- JSで動的生成 -->
          </div>
          <button type="button" id="scratch-btn" style="background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.2);color:var(--text-secondary);padding:0.6rem 1.25rem;border-radius:8px;cursor:pointer;font-size:0.9rem;width:100%;transition:all 0.2s;">
            ＋ ゼロから作る（空の型）
          </button>
        </section>
      </div>

      <!-- STEP 2: フィールド微調整 -->
      <div id="step2-panel" class="hidden">
        <div class="card-editor-grid">
          <section class="section glass-panel editor-left" style="margin-bottom:0;padding:1.5rem 2rem;">
            <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;border-bottom:1px solid var(--glass-border);padding-bottom:1rem;">
              <button type="button" id="back-to-step1" style="background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);color:var(--text-secondary);padding:0.35rem 0.75rem;border-radius:6px;cursor:pointer;font-size:0.82rem;">← 戻る</button>
              <h2 class="section-title" id="step2-title" style="margin:0;border:none;padding:0;font-size:1.05rem;">フィールドを微調整</h2>
            </div>

            <p style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:1rem;line-height:1.6;">フィールドの追加・削除・並び替え・詳細設定ができます。このカード専用の型になります。</p>

            <!-- 問題フィールド -->
            <div style="margin-bottom:1.5rem;">
              <div style="font-size:0.75rem;font-weight:700;color:#6366f1;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.6rem;display:flex;align-items:center;gap:0.5rem;">
                <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#6366f1;"></span>問題（おもて）
              </div>
              <div id="s2-q-container"></div>
              <button type="button" id="s2-add-q-btn" style="background:rgba(99,102,241,0.1);border:1px dashed rgba(99,102,241,0.4);color:#a78bfa;padding:0.4rem 1rem;border-radius:6px;cursor:pointer;font-size:0.82rem;width:100%;margin-top:0.25rem;">＋ 問題フィールドを追加</button>
            </div>

            <!-- 答えフィールド -->
            <div style="margin-bottom:1.5rem;">
              <div style="font-size:0.75rem;font-weight:700;color:#8b5cf6;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.6rem;display:flex;align-items:center;gap:0.5rem;">
                <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#8b5cf6;"></span>答え（うら）
              </div>
              <div id="s2-a-container"></div>
              <button type="button" id="s2-add-a-btn" style="background:rgba(139,92,246,0.1);border:1px dashed rgba(139,92,246,0.4);color:#a78bfa;padding:0.4rem 1rem;border-radius:6px;cursor:pointer;font-size:0.82rem;width:100%;margin-top:0.25rem;">＋ 答えフィールドを追加</button>
            </div>

            <div style="display:flex;gap:0.75rem;align-items:center;margin-top:0.5rem;">
              <button type="button" id="step2-next-btn" class="primary-btn">この型で入力する →</button>
              <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.82rem;color:var(--text-secondary);cursor:pointer;">
                <input type="checkbox" id="save-as-genre-chk" style="accent-color:#6366f1;"> この型をジャンルとして保存
              </label>
            </div>
          </section>

          <!-- STEP2 プレビュー -->
          <aside class="editor-right" style="position:sticky;top:2rem;">
            <section class="section glass-panel" style="margin-bottom:0;padding:1.5rem;">
              <div style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:0.75rem;font-weight:500;">フィールド構成プレビュー</div>
              <div id="step2-preview-panel"></div>
            </section>
          </aside>
        </div>
      </div>

      <!-- STEP 3: 入力フォーム（既存） -->
      <div id="step3-panel" class="hidden">
        <div class="card-editor-grid">
          <section class="section glass-panel editor-left" style="margin-bottom:0;padding:1.5rem 2rem;">
            <div style="display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--glass-border);padding-bottom:1rem;margin-bottom:1.5rem;">
              <button type="button" id="back-to-step2" style="background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);color:var(--text-secondary);padding:0.35rem 0.75rem;border-radius:6px;cursor:pointer;font-size:0.82rem;">← 型を変える</button>
              <h2 class="section-title" id="page-title" style="margin:0;border:none;padding:0;font-size:1.05rem;">新しいカードを追加</h2>
            </div>

            <form id="add-card-form" class="dynamic-form">
              <div id="form-fields"></div>
              <div class="form-actions">
                <button type="submit" id="submit-btn" class="primary-btn">追加する</button>
                <a id="cancel-edit-btn" href="cardlist.html" class="secondary-btn hidden" style="padding:0.6rem 1.2rem;border-radius:8px;border:1px solid var(--glass-border);color:var(--text-secondary);text-decoration:none;font-size:0.9rem;">← 問題DBに戻る</a>
                <div id="add-success-msg" class="success-msg hidden">✅ 保存しました！</div>
              </div>
            </form>
          </section>

          <!-- 右: プレビュー -->
          <aside class="editor-right" style="position:sticky;top:2rem;">
            <section class="section glass-panel" style="margin-bottom:0;padding:1.5rem;">
              <div style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:0.75rem;font-weight:500;">カードプレビュー（実際の表示と同じ）</div>
              <div id="card-preview-panel">
                <div style="color:var(--text-secondary);font-size:0.85rem;text-align:center;padding:2rem 0;">入力するとリアルタイムで表示されます</div>
              </div>
            </section>
          </aside>
        </div>
      </div>

    </main>
  </div>

  <script type="module" src="options.js?v=20260312c"></script>
  <script>
    (function(){
      const layout=document.getElementById('app-layout'),btn=document.getElementById('sidebar-toggle-btn'),overlay=document.getElementById('sidebar-overlay');
      const saved=localStorage.getItem('sidebar-mode')||'fixed';
      layout.className=layout.className.replace(/sidebar-fixed|sidebar-float/g,'').trim();
      layout.classList.add('sidebar-'+saved);
      function applyMode(){
        if(layout.classList.contains('sidebar-fixed'))btn.title='サイドバーを隠す';
        else btn.title='メニューを開く';
      }
      applyMode();
      btn.addEventListener('click',function(){
        if(layout.classList.contains('sidebar-fixed')){
          layout.classList.replace('sidebar-fixed','sidebar-float');
          localStorage.setItem('sidebar-mode','float');
        } else if(layout.classList.contains('sidebar-open')){
          layout.classList.remove('sidebar-open');
        } else if(layout.classList.contains('sidebar-float')){
          layout.classList.replace('sidebar-float','sidebar-fixed');
          localStorage.setItem('sidebar-mode','fixed');
        }
        applyMode();
      });
      overlay.addEventListener('click',function(){layout.classList.remove('sidebar-open');});
    })();
  </script>
</body>
</html>
