<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AutoAnki - 問題DB</title>
  <link rel="stylesheet" href="options.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== ツールバー ===== */
    /* ===== カードグリッド ===== */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    .card-item {
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .card-item:hover {
      transform: translateY(-4px);
      background: rgba(30, 41, 59, 0.8);
      border-color: rgba(99, 102, 241, 0.4);
      box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.5);
    }
    .card-thumb {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 1rem;
      background: rgba(0,0,0,0.2);
    }
    .card-genre {
      font-size: 0.7rem;
      font-weight: 600;
      color: #a78bfa;
      background: rgba(99, 102, 241, 0.15);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      align-self: flex-start;
      margin-bottom: 0.75rem;
    }
    .card-question {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: var(--text-primary);
    }
    .card-answer-preview {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.4;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .card-due {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .card-due.urgent { color: #10b981; font-weight: 600; }
    
    .card-actions {
      display: flex;
      gap: 0.5rem;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .card-item:hover .card-actions { opacity: 1; }

    .icon-btn-sm {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .icon-btn-sm:hover {
      background: var(--primary-accent);
      color: white;
      border-color: var(--primary-accent);
    }
    .icon-btn-sm.del:hover {
      background: #ef4444;
      border-color: #ef4444;
    }

    /* ===== ページネーション ===== */
    .pagination {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    .page-btn {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      min-width: 32px;
      height: 32px;
      padding: 0 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.82rem;
      transition: all 0.13s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .page-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
    .page-btn.active { background: var(--primary-accent); color: white; border-color: var(--primary-accent); }
    .page-btn:disabled { opacity: 0.35; cursor: default; }

    /* ===== 詳細モーダル ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: #1e293b;
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2rem;
      max-width: 640px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      animation: popIn 0.22s ease;
    }
    @keyframes popIn { from { opacity: 0; transform: scale(0.95) translateY(8px); } to { opacity: 1; transform: none; } }
    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--text-secondary);
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .modal-close:hover { background: rgba(239,68,68,0.2); color: #ef4444; }
    .modal-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; margin-top: 1.2rem; }
    .modal-label:first-of-type { margin-top: 0; }
    .modal-value { font-size: 0.98rem; line-height: 1.6; white-space: pre-wrap; color: var(--text-primary); }
    .modal-answer-value { color: #a78bfa; }
    .modal-images { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .modal-images img { max-height: 140px; max-width: 100%; border-radius: 8px; object-fit: contain; border: 1px solid var(--glass-border); }
    .modal-divider { height: 1px; background: var(--glass-border); margin: 1.2rem 0; }
    .modal-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .stat-cell {
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
      text-align: center;
    }
    .stat-cell .stat-val { font-size: 1.1rem; font-weight: 700; color: #a78bfa; }
    .stat-cell .stat-lbl { font-size: 0.72rem; color: var(--text-secondary); margin-top: 0.2rem; }
    .modal-footer { margin-top: 1.5rem; display: flex; gap: 0.75rem; justify-content: flex-end; }

    .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <div class="background-animation"></div>

  <div class="layout">
    <aside class="sidebar" id="app-sidebar">
      <div class="logo">
        <h1>AutoAnki</h1>
        <p>Effortless Spaced Repetition</p>
      </div>
      <div class="nav-links">
        <a href="dashboard.html" class="nav-btn">📊 ダッシュボード</a>
        <a href="index.html"     class="nav-btn">▶️ 問題を解く</a>
        <a href="options.html"   class="nav-btn">➕ 問題作成</a>
        <a href="cardlist.html"  class="nav-btn active">📋 問題DB</a>
        <a href="settings.html"  class="nav-btn">⚙️ 設定</a>
      </div>
    </aside>

    <main class="main-content">
      <section class="section glass-panel">
        <h2 class="section-title">📋 問題DB</h2>

        <div class="toolbar">
          <div style="flex: 1; display: flex; gap: 0.75rem;">
            <input type="text" id="search-input" class="search-input" style="flex: 1;" placeholder="🔍 問題・答えを検索…">
            <select id="genre-filter" class="filter-select">
              <option value="">すべてのジャンル</option>
            </select>
          </div>
          <div style="display: flex; gap: 0.75rem; align-items: center; margin-left: auto;">
            <select id="sort-select" class="sort-select">
              <option value="nextReviewDate-asc">復習が近い順</option>
              <option value="nextReviewDate-desc">復習が遠い順</option>
              <option value="created_at-desc">追加日が新しい順</option>
              <option value="created_at-asc">追加日が古い順</option>
              <option value="question-asc">五十音 (あ→ん)</option>
            </select>
            <span class="count-badge" id="count-badge">読み込み中…</span>
          </div>
        </div>

        <!-- ツールバー下部：件数など（必要に応じて） -->

        <!-- カードグリッド -->
        <div id="card-grid" class="card-grid"></div>

        <div class="empty-state hidden" id="empty-state">
          <div class="empty-icon">📭</div>
          <p>条件に合うカードが見つかりませんでした</p>
          <p style="font-size: 0.85rem; margin-top: 0.5rem; opacity: 0.7;">検索キーワードやフィルターを変えてみてください</p>
        </div>

        <div class="pagination" id="pagination"></div>
      </section>
    </main>
  </div>

  <!-- 詳細モーダル -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-box">
      <button class="modal-close" id="modal-close">✕</button>

      <div id="modal-genre-badge" style="font-size:0.75rem;color:#a78bfa;background:rgba(99,102,241,0.15);padding:0.1rem 0.6rem;border-radius:4px;display:inline-block;margin-bottom:0.75rem;"></div>

      <p class="modal-label">問題</p>
      <div class="modal-value" id="modal-question"></div>

      <div class="modal-images" id="modal-images"></div>

      <div class="modal-divider"></div>

      <p class="modal-label">答え</p>
      <div class="modal-value modal-answer-value" id="modal-answer"></div>

      <div class="modal-stats">
        <div class="stat-cell">
          <div class="stat-val" id="stat-next">—</div>
          <div class="stat-lbl">次回復習</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val" id="stat-interval">—</div>
          <div class="stat-lbl">インターバル（日）</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val" id="stat-ease">—</div>
          <div class="stat-lbl">難易度係数</div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="primary-btn" id="modal-edit-btn">✏️ 編集</button>
        <button class="danger-btn" id="modal-delete-btn">🗑️ 削除</button>
      </div>
    </div>
  </div>

  <!-- 編集モーダル -->
  <div class="modal-overlay hidden" id="edit-modal-overlay">
    <div class="modal-box">
      <button class="modal-close" id="edit-modal-close">✕</button>
      <h3 style="margin-bottom:1.25rem;font-size:1.1rem;">✏️ カードを編集</h3>

      <div id="edit-fields" style="display:flex;flex-direction:column;gap:1rem;">
        <!-- JSで動的に生成 -->
      </div>

      <!-- 画像プレビュー -->
      <div id="edit-image-preview" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem;"></div>

      <div style="margin-top:1.5rem;display:flex;gap:0.75rem;justify-content:flex-end;align-items:center;">
        <span id="edit-save-msg" class="success-msg hidden">✅ 保存しました！</span>
        <button class="primary-btn" id="edit-save-btn">保存する</button>
      </div>
    </div>
  </div>

  <script type="module" src="cardlist.js"></script>
</body>
</html>
