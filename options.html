<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AutoAnki Settings</title>
  <link rel="stylesheet" href="options.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-animation"></div>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar glass-panel">
      <div class="logo">
        <h1>AutoAnki</h1>
        <p>Effortless Spaced Repetition</p>
      </div>

      <div class="nav-links" style="margin-top: 2rem;">
        <a href="index.html" class="nav-btn">▶️ 問題を解く</a>
        <a href="dashboard.html" class="nav-btn">📊 ダッシュボード</a>
        <a href="options.html" class="nav-btn active">➕ 問題作成</a>
        <a href="cardlist.html" class="nav-btn">📋 問題一覧 (DB)</a>
      </div>

    </aside>

    <!-- Main Content -->
    <main class="main-content">
      

      <!-- Add Card Section -->
      <section id="add-card" class="section glass-panel">
        <h2 class="section-title">新しいカードを追加</h2>
        <form id="add-card-form" class="form-container">
          <div class="form-group">
            <label for="question-input">問題 (Question)</label>
            <textarea id="question-input" rows="3" placeholder="例: ミトコンドリアの役割は？" required></textarea>
          </div>
          <div class="form-group">
            <label for="answer-input">答え (Answer)</label>
            <textarea id="answer-input" rows="2" placeholder="例: ATPを作る" required></textarea>
          </div>
          <div class="form-group">
            <label for="image-input">画像 (任意)</label>
            <input type="text" id="image-input" placeholder="例: images/sample.png" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 1rem; color: #f8fafc; font-family: inherit; font-size: 1rem;">
          </div>
          <button type="submit" class="primary-btn">追加する</button>
          <div id="add-success-msg" class="success-msg hidden">カードを追加しました！</div>
        </form>
      </section>

      </section>

    </main>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
