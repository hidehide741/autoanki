<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AutoAnki - 設定</title>
  <link rel="stylesheet" href="options.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* 固有の微調整 */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    /* ===== ジャンルリスト ===== */
    .genre-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }
    .genre-card {
      background: rgba(15,23,42,0.5);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.25rem;
      transition: all 0.2s;
    }
    .genre-card:hover { border-color: rgba(99,102,241,0.4); transform: translateY(-2px); }
    .genre-card-name {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 0.6rem;
      color: var(--text-primary);
    }
    .genre-card-fields {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
      line-height: 1.6;
    }
    .genre-card-actions {
      display: flex;
      gap: 0.6rem;
      justify-content: flex-end;
    }

    /* ===== ボタン共通 (options.cssにない分を補完) ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-secondary {
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.3);
      color: #a78bfa;
    }
    .btn-secondary:hover { background: rgba(99,102,241,0.25); }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.82rem; }

    /* ===== エディタ (2列レイアウト) ===== */
    .genre-editor-grid {
      display: grid;
      grid-template-columns: 6fr 4fr;
      gap: 2.5rem;
      align-items: start;
    }
    @media (max-width: 900px) {
      .genre-editor-grid { grid-template-columns: 1fr; }
      .editor-right { position: static !important; }
    }

    .field-section {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .field-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .field-section-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 130px auto auto;
      gap: 0.6rem;
      align-items: center;
      margin-bottom: 0.75rem;
      background: rgba(255,255,255,0.03);
      padding: 0.4rem;
      border-radius: 8px;
    }
    .field-row input, .field-row select {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      padding: 0.45rem 0.75rem;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.88rem;
    }
    .required-toggle {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .btn-remove {
      background: none;
      border: none;
      color: #f87171;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0.5;
      padding: 0 0.4rem;
    }
    .btn-remove:hover { opacity: 1; }

    .genre-name-input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 0.8rem 1.1rem;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1.05rem;
      margin-bottom: 2rem;
    }

    /* プレビュー */
    .preview-box {
      background: rgba(15,23,42,0.8);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
    }
    .preview-field { margin-bottom: 1rem; }
    .preview-field-label { font-size: 0.72rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
    .preview-field-dummy {
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 6px;
      background: rgba(0,0,0,0.2);
    }
    .preview-field-dummy.text { height: 32px; }
    .preview-field-dummy.textarea { height: 60px; }
    .preview-field-dummy.image {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    .editor-footer {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 1rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--glass-border);
    }

    /* トースト */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: #10b981;
      color: white;
      padding: 0.8rem 1.8rem;
      border-radius: 40px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-weight: 600;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: #ef4444; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="background-animation"></div>

  <div class="layout">
    <!-- サイドバー -->
    <aside class="sidebar">
      <div class="logo">
        <h1>AutoAnki</h1>
        <p>Effortless Spaced Repetition</p>
      </div>
      <div class="nav-links">
        <a href="dashboard.html" class="nav-btn">📊 ダッシュボード</a>
        <a href="index.html"     class="nav-btn">▶️ 問題を解く</a>
        <a href="options.html"   class="nav-btn">➕ 問題作成</a>
        <a href="cardlist.html"  class="nav-btn">📋 問題DB</a>
        <a href="settings.html"  class="nav-btn active">⚙️ 設定</a>
      </div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main-content">
      <!-- ジャンル一覧 -->
      <section class="section glass-panel" id="genre-list-section">
        <div class="section-header">
          <h2 class="section-title" style="margin:0; border:none; padding:0;">⚙️ ジャンル管理</h2>
          <button class="primary-btn" id="add-genre-btn">＋ 新規ジャンル</button>
        </div>
        <div class="genre-grid" id="genre-list">
          <!-- JSで動的生成 -->
        </div>
      </section>

      <!-- ジャンル詳細エディタ (2つの独立したパネル) -->
      <div class="genre-editor-grid hidden" id="genre-editor">
        <!-- 左カラム: 入力フォームパネル -->
        <section class="section glass-panel editor-left" style="margin-bottom: 0; padding: 1.5rem 2rem;">
          <div class="section-header" style="border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; margin-bottom: 2rem;">
            <h2 class="section-title" id="editor-title" style="margin:0; border:none; padding:0;">✏️ ジャンルを追加</h2>
          </div>

          <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">1. ジャンル名</div>
          <input type="text" id="genre-name" class="genre-name-input" placeholder="例: 英単語、プログラミング">

          <!-- 2. 問題フィールド -->
          <div class="field-section">
            <div class="field-section-header">
              <span class="field-section-label">2. 問題フィールド（おもて）</span>
              <button type="button" class="btn btn-secondary btn-sm" id="add-q-field-btn">＋ 追加</button>
            </div>
            <div id="q-fields-container"></div>
          </div>

          <!-- 3. 回答フィールド -->
          <div class="field-section">
            <div class="field-section-header">
              <span class="field-section-label">3. 回答フィールド（うら）</span>
              <button type="button" class="btn btn-secondary btn-sm" id="add-a-field-btn">＋ 追加</button>
            </div>
            <div id="a-fields-container"></div>
          </div>

          <div class="editor-footer">
            <button type="button" class="btn btn-secondary" id="cancel-btn">キャンセル</button>
            <button type="button" class="primary-btn" id="save-genre-btn">保存する</button>
          </div>
        </section>

        <!-- 右カラム: プレビューパネル -->
        <aside class="editor-right" style="position: sticky; top: 2rem;">
          <section class="section glass-panel" style="margin-bottom: 0; padding: 1.5rem;">
            <div class="field-section-label" style="margin-bottom: 1rem; color: var(--text-secondary);">リアルタイムプレビュー</div>
            <div class="preview-box" id="preview-panel" style="background: rgba(0,0,0,0.25); border-color: rgba(255,255,255,0.05);">
              <p style="color: var(--text-secondary); font-size: 0.85rem; text-align: center;">フィールドを追加するとプレビューが表示されます</p>
            </div>
          </section>
        </aside>
      </div>
    </main>
  </div>

  <div id="toast" class="toast">
    <span id="toast-msg">保存しました</span>
  </div>

  <script src="settings.js" type="module"></script>
</body>
</html>
