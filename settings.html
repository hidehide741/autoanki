<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AutoAnki - 設定</title>
  <link rel="stylesheet" href="options.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .genre-list { display: flex; flex-direction: column; gap: 1rem; }
    .genre-item {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .genre-item-info { flex: 1; }
    .genre-item-name { font-weight: 600; margin-bottom: 0.25rem; }
    .genre-fields-preview { font-size: 0.8rem; color: var(--text-secondary); }
    .default-badge {
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      background: rgba(99,102,241,0.2);
      color: #a78bfa;
      border-radius: 4px;
      margin-left: 0.5rem;
    }
    .genre-item-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

    /* 追加フォーム */
    .add-genre-form { display: flex; flex-direction: column; gap: 1rem; }
    .field-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.5rem; }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 0.5rem;
      align-items: center;
    }
    .field-row input, .field-row select {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
    }
    .small-btn {
      padding: 0.4rem 0.7rem;
      border-radius: 6px;
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.8rem;
    }
    .small-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
    .add-field-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      border: 1px dashed var(--glass-border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .add-field-btn:hover { border-color: var(--primary-accent); color: var(--text-primary); }
  </style>
</head>
<body>
  <div class="background-animation"></div>

  <div class="layout">
    <aside class="sidebar glass-panel">
      <div class="logo">
        <h1>AutoAnki</h1>
        <p>Effortless Spaced Repetition</p>
      </div>
      <div class="nav-links" style="margin-top: 2rem;">
        <a href="dashboard.html" class="nav-btn">📊 ダッシュボード</a>
        <a href="index.html" class="nav-btn">▶️ 問題を解く</a>
        <a href="options.html" class="nav-btn">➕ 問題作成</a>
        <a href="cardlist.html" class="nav-btn">📋 問題DB</a>
        <a href="settings.html" class="nav-btn active">⚙️ 設定</a>
      </div>
    </aside>

    <main class="main-content">
      <!-- ジャンル一覧 -->
      <section class="section glass-panel">
        <h2 class="section-title">⚙️ ジャンル管理</h2>
        <div class="genre-list" id="genre-list">
          <!-- JSで動的生成 -->
        </div>
      </section>

      <!-- ジャンル追加フォーム -->
      <section class="section glass-panel mt">
        <h2 class="section-title">➕ ジャンルを追加</h2>
        <div class="add-genre-form">
          <div class="form-group">
            <label>ジャンル名 <span style="color: var(--text-secondary); font-size: 0.8rem;">（絵文字も使えます: 例「🎵 音楽」）</span></label>
            <input type="text" id="new-genre-name" placeholder="例: 🎵 音楽" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; padding: 0.8rem 1rem; color: var(--text-primary); font-family: inherit; font-size: 0.95rem;">
          </div>

          <div class="form-group">
            <label>入力フィールド定義 <span style="color: var(--text-secondary); font-size: 0.8rem;">（「問題」「答え」は自動追加）</span></label>
            <div class="field-list" id="new-field-list">
              <!-- 追加フィールドのみここに表示 -->
            </div>
            <button type="button" class="add-field-btn" id="add-field-btn">＋ フィールドを追加</button>
          </div>

          <div>
            <button id="save-genre-btn" class="primary-btn">保存する</button>
            <span id="save-msg" class="success-msg hidden">✅ 保存しました！</span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="settings.js"></script>
</body>
</html>
