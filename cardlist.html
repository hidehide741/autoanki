<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Card List - AutoAnki</title>
  <link rel="stylesheet" href="options.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-animation"></div>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar glass-panel">
      <div class="logo">
        <h1>AutoAnki</h1>
        <p>Effortless Spaced Repetition</p>
      </div>

      <div class="nav-links" style="margin-top: 2rem;">
        <a href="dashboard.html" class="nav-btn">📊 ダッシュボード</a>
        <a href="index.html" class="nav-btn">▶️ 問題を解く</a>
        <a href="options.html" class="nav-btn">➕ 問題作成</a>
        <a href="cardlist.html" class="nav-btn active">📋 問題DB</a>
        <a href="settings.html" class="nav-btn">⚙️ 設定</a>
      </div>

    </aside>

    <!-- Main Content -->
    <main class="main-content">
      


      <!-- Card List Section -->
      <section id="card-list" class="section glass-panel mt">
        <h2 class="section-title">登録済みのカード一覧 (Database)</h2>
        <div class="table-container">
          <table id="cards-table">
            <thead>
              <tr>
                <th>問題</th>
                <th>画像/パス</th>
                <th>答え</th>
                <th>次回レビュー</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="cards-tbody">
              <!-- JSで動的に追加 -->
            </tbody>
          </table>
        </div>
        <div id="empty-state" class="empty-state hidden">
          <p>カードが登録されていません。</p>
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="cardlist.js"></script>
</body>
</html>
