<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AutoAnki - 設定</title>
  <link rel="stylesheet" href="options.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .main-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--primary-accent); }

    .genre-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .genre-item {
      background: rgba(30, 41, 59, 0.4);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1rem;
      transition: all 0.2s;
      cursor: default;
    }
    .genre-item:hover { border-color: rgba(99, 102, 241, 0.4); }
    .genre-item.default { border-left: 4px solid var(--primary-accent); }
    .genre-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .genre-name { font-weight: 600; font-size: 1.1rem; }
    .genre-fields-preview {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }
    .genre-item-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    /* エディタ */
    .field-section {
      background: rgba(0,0,0,0.15);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .field-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .field-section-title { font-weight: 600; color: #a78bfa; }
    
    .field-row {
      display: grid;
      grid-template-columns: 1fr 140px 60px 40px;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 0.75rem;
      background: rgba(255,255,255,0.03);
      padding: 0.5rem;
      border-radius: 6px;
    }
    .field-row input, .field-row select {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      font-family: inherit;
    }
    .required-toggle {
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
    }
    .btn-remove {
      background: transparent;
      border: none;
      color: #ef4444;
      font-size: 1.25rem;
      cursor: pointer;
      opacity: 0.6;
    }
    .btn-remove:hover { opacity: 1; }

    .editor-actions {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 2rem;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #10b981;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 30px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: #ef4444; }

    .mt { margin-top: 2rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="main-container">
    <header class="header">
      <h1 class="logo-text">Auto<span>Anki</span></h1>
      <nav class="nav-links">
        <a href="cardlist.html">問題DB</a>
        <a href="options.html">カード作成</a>
        <a href="settings.html" class="active">設定</a>
      </nav>
    </header>

    <main class="main-content">
      <!-- ジャンル一覧 -->
      <section class="section glass-panel" id="genre-list-section">
        <div class="header" style="margin-bottom: 1rem;">
          <h2 class="section-title">⚙️ ジャンル管理</h2>
          <button class="btn btn-primary" id="add-genre-btn">+ 新規ジャンル</button>
        </div>
        <div class="genre-list" id="genre-list">
          <!-- JSで動的生成 -->
        </div>
      </section>

      <!-- ジャンル詳細エディタ -->
      <section class="section glass-panel hidden" id="genre-editor">
        <h2 class="section-title">✏️ ジャンルの編集</h2>
        
        <div class="input-group" style="margin-bottom: 2rem;">
          <label for="genre-name" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">1. ジャンル名</label>
          <input type="text" id="genre-name" placeholder="例: 英単語、プログラミング" style="width: 100%; max-width: 400px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; padding: 0.8rem 1rem; color: var(--text-primary); font-family: inherit; font-size: 1rem;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 300px; gap: 2rem;">
          <div>
            <!-- 問題フィールド群 -->
            <div class="field-section">
              <div class="field-section-header">
                <span class="field-section-title">2. 問題フィールド定義 (おもて)</span>
                <button type="button" class="btn btn-secondary btn-sm" id="add-q-field-btn">+ 追加</button>
              </div>
              <div class="fields-list" id="q-fields-container"></div>
            </div>

            <!-- 答えフィールド群 -->
            <div class="field-section">
              <div class="field-section-header">
                <span class="field-section-title">3. 答えフィールド定義 (うら)</span>
                <button type="button" class="btn btn-secondary btn-sm" id="add-a-field-btn">+ 追加</button>
              </div>
              <div class="fields-list" id="a-fields-container"></div>
            </div>
          </div>

          <!-- プレビュー -->
          <div id="preview-section">
            <div id="preview-panel"></div>
          </div>
        </div>

        <div class="editor-actions">
          <button type="button" class="btn btn-secondary" id="cancel-btn">キャンセル</button>
          <button type="button" class="btn btn-primary" id="save-genre-btn">保存する</button>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast">
    <span id="toast-msg">保存しました</span>
  </div>

  <script src="settings.js" type="module"></script>
</body>
</html>
