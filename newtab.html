<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png" type="image/png">
  <title>AutoAnki</title>
  <meta name="description" content="AutoAnki - スペーシングリピティションで効率的に学習">
  <link rel="stylesheet" href="newtab.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-animation"></div>

  <div class="layout sidebar-expanded" id="app-layout">
    <!-- サイドバー -->
    <aside class="sidebar" id="app-sidebar">
      <div class="logo">
        <h1>AutoAnki</h1>
        <p>Effortless Spaced Repetition</p>
      </div>
      <div class="nav-links">
        <a href="dashboard.html" class="nav-btn"><span class="nav-icon">📊</span><span class="nav-text"> ダッシュボード</span></a>
        <a href="newtab.html"    class="nav-btn active"><span class="nav-icon">▶️</span><span class="nav-text"> 問題を解く</span></a>
        <a href="options.html"   class="nav-btn"><span class="nav-icon">➕</span><span class="nav-text"> 問題作成</span></a>
        <a href="cardlist.html"  class="nav-btn"><span class="nav-icon">📋</span><span class="nav-text"> 問題DB</span></a>
        <a href="settings.html"  class="nav-btn"><span class="nav-icon">⚙️</span><span class="nav-text"> 設定</span></a>
        <a href="memo.html"      class="nav-btn"><span class="nav-icon">🗒️</span><span class="nav-text"> メモ</span></a>
      </div>
      <button class="sidebar-toggle-btn" id="sidebar-toggle-btn" title="折りたたむ">‹</button>
    </aside>

    <!-- メインコンテンツ -->
    <div class="main-content">

      <!-- トップバー -->
      <div class="top-bar">
        <div class="stats" id="stats-display">
          <span class="stat-item" title="今日の学習数">✅ <span id="today-count">0</span></span>
          <span class="stat-item" title="連続学習日数">🔥 <span id="streak-count">0</span></span>
        </div>
        <div class="actions">
          <button id="skip-btn"    class="icon-btn" title="スキップ (Esc)">⏭ スキップ</button>
          <button id="options-btn" class="icon-btn" title="管理">⚙️ 管理</button>
        </div>
      </div>

      <!-- カード表示エリア -->
      <main class="container">

        <!-- 問題カード -->
        <div id="card-container" class="glass-card hidden">
          <div class="card-content">
            <!-- ジャンルバッジ -->
            <div id="genre-badge" class="genre-badge-display hidden"></div>

            <!-- 進捗バー -->
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" id="progress-bar" style="width: 0%"></div>
            </div>

            <!-- 動的コンテンツ：問題エリア -->
            <div id="question-area"></div>

            <!-- 答えを見るボタン -->
            <button id="show-answer-btn" class="primary-btn">答えを見る&nbsp;&nbsp;<span style="opacity:0.6;font-size:0.85em;">(Space)</span></button>

            <!-- 答えセクション -->
            <div id="answer-section" class="answer-section hidden">
              <div class="divider"></div>
              <!-- 動的コンテンツ：回答エリア -->
              <div id="answer-area"></div>

              <div class="rating-buttons">
                <button class="rating-btn btn-again" data-quality="1">
                  <span class="rating-icon">😰</span>
                  <span class="label">忘れた</span>
                  <span class="sub">12時間</span>
                </button>
                <button class="rating-btn btn-hard" data-quality="3">
                  <span class="rating-icon">😓</span>
                  <span class="label">難しい</span>
                  <span class="sub">1日</span>
                </button>
                <button class="rating-btn btn-good" data-quality="4">
                  <span class="rating-icon">😊</span>
                  <span class="label">普通</span>
                  <span class="sub">3日</span>
                </button>
                <button class="rating-btn btn-easy" data-quality="5">
                  <span class="rating-icon">🎯</span>
                  <span class="label">簡単</span>
                  <span class="sub">7日+</span>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- カードなし画面 -->
        <div id="empty-container" class="glass-card done-card hidden">
          <div class="done-icon">📭</div>
          <h1 class="done-title">今日の問題はありません</h1>
          <p class="done-message">すべての問題は復習済みです。<br>次のタブを開くと Google に戻ります。</p>
          <div class="done-links">
            <a href="options.html" class="link-btn">➕ 問題を追加</a>
            <a href="dashboard.html" class="link-btn">📊 ダッシュボード</a>
          </div>
        </div>

        <!-- エラー画面 -->
        <div id="error-container" class="glass-card done-card hidden">
          <div class="done-icon">⚠️</div>
          <h1 class="done-title" style="font-size:1.4rem;">読み込みエラー</h1>
          <p class="done-message" id="error-message">データの取得に失敗しました。<br>ネットワーク接続を確認してください。</p>
          <div class="done-links">
            <button class="link-btn" id="reload-btn">🔄 再読み込み</button>
          </div>
        </div>

        <!-- 完了画面 -->
        <div id="done-container" class="glass-card done-card hidden">
          <div class="done-icon">🎉</div>
          <h1 class="done-title">All Done!</h1>
          <p class="done-message">今日の復習は完了です。<br>また明日続けましょう！</p>
          <div class="done-stats">
            <div class="done-stat">
              <span class="val" id="done-today">—</span>
              <span class="lbl">今日の学習</span>
            </div>
            <div class="done-stat">
              <span class="val" id="done-streak">—</span>
              <span class="lbl">連続日数</span>
            </div>
          </div>
          <div class="done-links">
            <a href="options.html" class="link-btn">➕ 問題を追加</a>
            <a href="dashboard.html" class="link-btn">📊 ダッシュボード</a>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script type="module" src="newtab.js?v=20260312c"></script>
  <script src="sidebar.js"></script>
</body>
</html>
